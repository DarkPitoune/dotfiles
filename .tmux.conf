set -g mouse on
set -g allow-passthrough on
setw -g mode-keys vi
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm-ghostty:Tc,tmux-256color:Tc'
set -ga terminal-overrides ',xterm-ghostty:Ss=\E[%p1%d q:Se=\E[5 q'
set -g @continuum-restore 'on'
set -g renumber-windows on

# Window naming: auto-name by directory, manual rename sticks
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"
set -g allow-rename off

# Prefix: Ctrl-Space instead of Ctrl-B
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Pane navigation (vim-tmux-navigator handles this now)
# Alt + h/j/k/l kept as fallback
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window navigation without prefix (Shift + arrow)
bind -n S-Left previous-window
bind -n S-Right next-window

# Make new panels in the same directory
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Status bar ──────────────────────────────────────────
# OneDark palette
%hidden OD_BG="#282c34"
%hidden OD_FG="#abb2bf"
%hidden OD_BLUE="#61afef"
%hidden OD_GREEN="#98c379"
%hidden OD_PURPLE="#c678dd"
%hidden OD_GREY="#3e4452"
%hidden OD_DGREY="#2c313a"
%hidden OD_ZOOM_BG="#4a421e"

# Status bar bg changes when zoomed
set -g status-style "bg=#{OD_BG},fg=#{OD_FG}"
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-left-length 120
set -g status-right-length 90
set -g status-interval 15

# Per-host identity (override in ~/.tmux.conf.local)
set -g @host-name "#H"
set -g @host-color "#61afef"

# Left: host pill + meeting warning + spotify
set -g status-left "#[fg=#{?window_zoomed_flag,#ffff00,#{@host-color}}]#[fg=#{OD_BG},bg=#{?window_zoomed_flag,#ffff00,#{@host-color}},bold]#{@host-name}#[fg=#{?window_zoomed_flag,#ffff00,#{@host-color}},bg=#{OD_BG}] #(~/.tmux/scripts/meeting.sh)#(~/.tmux/scripts/spotify.sh)"

# Open meeting link with prefix + j
bind j run-shell "~/.tmux/scripts/open-meeting.sh"

# Right: git branch + path + time
set -g status-right "#(~/.tmux/scripts/git-branch.sh #{pane_current_path})#[fg=#{OD_GREY}]#[fg=#{OD_FG},bg=#{OD_GREY}]#(dirname #{pane_current_path} | sed 's|/Users/pierre.dhebrail|~|')/#[fg=#{OD_GREEN},bg=#{OD_GREY},bold]#{b:pane_current_path}#[nobold,fg=#{OD_GREY},bg=default] #[fg=#{OD_DGREY}]#[fg=#{OD_PURPLE},bg=#{OD_DGREY}]%H:%M#[fg=#{OD_DGREY},bg=default]"

# Window list: two-tone pills (number badge + muted name)
set -g window-status-format "#[fg=#{OD_GREY}]#[fg=#{OD_FG},bg=#{OD_GREY},bold]#I #[fg=#{OD_GREY},bg=#{OD_DGREY},nobold]#[fg=#{OD_FG},bg=#{OD_DGREY}] #W#[fg=#{OD_DGREY},bg=default]"
set -g window-status-current-format "#[fg=#{OD_BLUE}]#[fg=#{OD_BG},bg=#{OD_BLUE},bold]#I #[fg=#{OD_BLUE},bg=#{OD_DGREY},nobold]#[fg=#{OD_FG},bg=#{OD_DGREY}] #W#[fg=#{OD_DGREY},bg=default]"
set -g window-status-separator " "

# Pane borders
set -g pane-border-style "fg=#{OD_GREY}"
set -g pane-active-border-style "fg=#{OD_BLUE}"

# Message style
set -g message-style "bg=#{OD_GREY},fg=#{OD_FG}"

# Copy mode / selection style (blue highlight)
set -g mode-style "bg=#{OD_BLUE},fg=#{OD_BG}"

# Vi copy mode: yank to system clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Plugin list
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'unsafe9/claude-tmux-hop'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Keep this at the end
# Per-host override (colors, name, etc.)
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"

run '~/.tmux/plugins/tpm/tpm'
